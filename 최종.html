<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>예산 & 스타일 맞춤 여름방학 여행지 추천</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans KR', sans-serif;
        }
        body {
            background-color: #f0f8ff;
            color: #333;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 900px;
        }
        
        /* 헤더 */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .header h1 {
            color: #0056b3;
            font-size: 36px;
            margin-bottom: 15px;
            letter-spacing: -1px;
        }
        .header p {
            font-size: 18px;
            color: #555;
        }

        /* 입력 폼 영역 */
        .input-section {
            background: white;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            margin-bottom: 40px;
        }

        .input-group {
            margin-bottom: 30px;
            text-align: center;
        }
        .input-group label {
            display: block;
            font-size: 20px;
            font-weight: bold;
            color: #0056b3;
            margin-bottom: 15px;
        }

        /* 예산 입력 폼 */
        .budget-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }
        input[type="number"] {
            font-size: 24px;
            font-weight: bold;
            padding: 15px 20px;
            border: 2px solid #b3d4ff;
            border-radius: 12px;
            width: 300px;
            outline: none;
            color: #0056b3;
            text-align: right;
            transition: all 0.3s;
        }
        input[type="number"]:focus {
            border-color: #0056b3;
            box-shadow: 0 0 0 4px rgba(0, 86, 179, 0.1);
        }
        .budget-unit {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }

        /* 스타일 선택 버튼 */
        .style-options {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .style-options input[type="radio"] {
            display: none;
        }
        .style-label {
            background-color: #f8f9fa;
            border: 2px solid #e9ecef;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            color: #6c757d;
            cursor: pointer;
            transition: all 0.2s;
        }
        .style-options input[type="radio"]:checked + .style-label {
            background-color: #0056b3;
            border-color: #0056b3;
            color: white;
            box-shadow: 0 4px 10px rgba(0, 86, 179, 0.3);
        }

        /* 제출 버튼 */
        .submit-btn {
            display: block;
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            font-size: 20px;
            font-weight: bold;
            background-color: #0056b3;
            color: white;
            border: none;
            padding: 18px 40px;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .submit-btn:hover {
            background-color: #003d82;
        }

        /* 에러 메시지 */
        .error-msg {
            color: #d93025;
            font-weight: bold;
            display: none;
            margin-top: 20px;
            padding: 15px;
            background-color: #fce8e6;
            border-radius: 8px;
            text-align: center;
        }

        /* 결과 표시 영역 */
        .results-section {
            display: none;
        }
        .results-header {
            font-size: 24px;
            margin-bottom: 25px;
            text-align: center;
            color: #0056b3;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
        }
        
        /* 카드 디자인 */
        .card {
            background: white;
            padding: 30px 20px;
            border-radius: 16px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            border-top: 6px solid #0056b3;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0,86,179,0.15);
        }
        .card::after {
            content: "클릭해서 명소 보기👆";
            display: block;
            margin-top: 15px;
            font-size: 13px;
            color: #888;
        }
        .rank-badge {
            background-color: #ffd700;
            color: #b8860b;
            font-size: 14px;
            font-weight: bold;
            padding: 5px 15px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 10px;
        }
        .style-badge {
            display: block;
            font-size: 13px;
            color: #0056b3;
            margin-bottom: 15px;
        }
        .card-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #222;
        }
        .card-budget {
            color: #0056b3;
            font-size: 18px;
            font-weight: bold;
            background-color: #f0f8ff;
            padding: 10px;
            border-radius: 8px;
        }

        /* 팝업(모달) 디자인 */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.6);
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .modal.show {
            display: flex;
            opacity: 1;
        }
        .modal-content {
            background-color: white;
            padding: 40px;
            border-radius: 20px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            position: relative;
            transform: translateY(20px);
            transition: transform 0.3s;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
        }
        .modal.show .modal-content {
            transform: translateY(0);
        }
        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 30px;
            color: #aaa;
            cursor: pointer;
            transition: color 0.2s;
        }
        .close-btn:hover { color: #333; }
        .modal-title {
            font-size: 28px;
            color: #0056b3;
            margin-bottom: 20px;
            border-bottom: 2px solid #f0f8ff;
            padding-bottom: 10px;
        }
        .modal-spots {
            list-style: none;
            padding: 0;
            margin: 0;
            text-align: left;
        }
        .modal-spots li {
            font-size: 18px;
            padding: 12px 15px;
            margin-bottom: 10px;
            background-color: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #0056b3;
        }

        /* 반응형 */
        @media (max-width: 768px) {
            .grid-container { grid-template-columns: 1fr; }
            .budget-wrapper { flex-direction: column; }
            input[type="number"], .submit-btn { width: 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>✈️ 맞춤형 여름방학 여행지 추천</h1>
        <p>예산과 여행 스타일을 선택하고, 추천 여행지를 클릭해 명소를 확인하세요!</p>
    </div>

    <div class="input-section">
        <div class="input-group">
            <label>1. 예산이 얼마인가요?</label>
            <div class="budget-wrapper">
                <input type="number" id="budgetInput" placeholder="예: 500000" step="10000">
                <span class="budget-unit">원</span>
            </div>
        </div>

        <div class="input-group">
            <label>2. 어떤 여행을 원하시나요?</label>
            <div class="style-options">
                <input type="radio" id="style_relax" name="travelStyle" value="휴양형" checked>
                <label for="style_relax" class="style-label">🌴 휴양 (자연·힐링)</label>
                
                <input type="radio" id="style_activity" name="travelStyle" value="액티비티형">
                <label for="style_activity" class="style-label">🚴 액티비티 (체험·관광)</label>

                <input type="radio" id="style_culture" name="travelStyle" value="맛집·문화탐방형">
                <label for="style_culture" class="style-label">🍜 맛집·문화 (도시·전통)</label>
            </div>
        </div>

        <button class="submit-btn" onclick="findDestinations()">여행지 추천받기</button>
        <p class="error-msg" id="errorMsg"></p>
    </div>

    <div class="results-section" id="resultsSection">
        <h2 class="results-header">✨ 당신을 위한 맞춤 추천 TOP 3 ✨</h2>
        <div class="grid-container" id="resultsGrid">
            </div>
    </div>
</div>

<div id="spotModal" class="modal" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close-btn" onclick="closeModal(null, true)">&times;</span>
        <h2 class="modal-title" id="modalTitle">여행지 이름</h2>
        <p style="margin-bottom:15px; color:#666; font-weight:bold;">📍 이곳은 꼭 가보세요!</p>
        <ul class="modal-spots" id="modalSpots">
            </ul>
    </div>
</div>

    function findDestinations() {
        const inputVal = document.getElementById('budgetInput').value;
        const selectedStyle = document.querySelector('input[name="travelStyle"]:checked').value;
        
        const errorMsg = document.getElementById('errorMsg');
        const resultsSection = document.getElementById('resultsSection');
        const resultsGrid = document.getElementById('resultsGrid');
        
        // 초기화
        errorMsg.style.display = 'none';
        resultsSection.style.display = 'none';
        resultsGrid.innerHTML = '';

        const budget = parseInt(inputVal);

        if (isNaN(budget) || budget < 50000) {
            errorMsg.style.display = 'block';
            errorMsg.innerText = "최소 50,000원 이상의 예산을 입력해주세요.";
            return;
        }

        const possibleDestinations = destinations.filter(dest => 
            dest.cost <= budget && dest.style === selectedStyle
        );
        
        if (possibleDestinations.length === 0) {
            errorMsg.style.display = 'block';
            errorMsg.innerHTML = `해당 예산으로 갈 수 있는 <strong>'${selectedStyle}'</strong> 여행지가 없습니다.<br>예산을 올리거나 다른 여행 스타일을 선택해보세요.`;
            return;
        }

        possibleDestinations.sort((a, b) => b.cost - a.cost);
        const top3 = possibleDestinations.slice(0, 3);

        top3.forEach((dest, index) => {
            const card = document.createElement('div');
            card.className = 'card';
            
            // 카드 클릭 시 모달 열기 이벤트 연결
            card.onclick = () => openModal(dest.name, dest.spots);
            
            const formattedCost = dest.cost.toLocaleString() + '원';
            
            card.innerHTML = `
                <div class="rank-badge">추천 ${index + 1}순위</div>
                <span class="style-badge">${dest.style}</span>
                <div class="card-title">${dest.name}</div>
                <div class="card-budget">예상 예산: ${formattedCost}~</div>
            `;
            resultsGrid.appendChild(card);
        });

        resultsSection.style.display = 'block';
    }

    // 모달 제어 함수
    function openModal(name, spots) {
        document.getElementById('modalTitle').innerText = name;
        
        const spotsList = document.getElementById('modalSpots');
        spotsList.innerHTML = ''; // 기존 리스트 초기화
        
        // 명소 리스트 생성
        spots.forEach(spot => {
            const li = document.createElement('li');
            li.innerHTML = `<strong>${spot}</strong>`;
            spotsList.appendChild(li);
        });

        const modal = document.getElementById('spotModal');
        modal.classList.add('show');
    }

    function closeModal(event, forceClose = false) {
        const modal = document.getElementById('spotModal');
        // 검은 배경을 클릭했거나(X 버튼을 누른 경우) 닫기
        if (forceClose || event.target === modal) {
            modal.classList.remove('show');
        }
    }
